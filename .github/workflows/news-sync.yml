name: Sync News RSS

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      CEJTT_SUPABASE_URL: ${{ secrets.CEJTT_SUPABASE_URL }}
      CEJTT_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CEJTT_SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run news:sync-rss
